<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHR Remove BG</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:20px;
  width:95%;
  max-width:400px;
  text-align:center;
  color:#fff;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h2{
  margin-bottom:15px;
}

input{
  margin-bottom:15px;
  color:white;
}

button{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border:none;
  padding:12px 25px;
  border-radius:30px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:8px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

canvas{
  margin-top:15px;
  max-width:100%;
  border-radius:15px;
}

.loader{
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #fff;
  border-radius:50%;
  width:35px;
  height:35px;
  animation:spin 1s linear infinite;
  display:none;
  margin:10px auto;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.footer{
  font-size:12px;
  margin-top:10px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="card">
  <h2>AHR Remove BG</h2>

  <input type="file" id="upload" accept="image/*">
  <br>
  <button onclick="processImage()">Remove Background</button>

  <div class="loader" id="loader"></div>

  <canvas id="canvas"></canvas>

  <button onclick="downloadImage()">Download Image</button>

  <div class="footer">AI Powered • No API • Hosted on GitHub</div>
</div>

<script>
let net;

async function loadModel(){
  net = await bodyPix.load({
    architecture: 'MobileNetV1',
    outputStride: 16,
    multiplier: 0.75,
    quantBytes: 2
  });
}
loadModel();

async function processImage(){
  const file = document.getElementById("upload").files[0];
  if(!file){
    alert("Select image first!");
    return;
  }

  const loader = document.getElementById("loader");
  loader.style.display="block";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = async ()=>{
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    const segmentation = await net.segmentPerson(img,{
      internalResolution: 'medium',
      segmentationThreshold: 0.7
    });

    const mask = bodyPix.toMask(segmentation);
    ctx.putImageData(mask,0,0);

    ctx.globalCompositeOperation="source-in";
    ctx.drawImage(img,0,0);

    loader.style.display="none";
  }
}

function downloadImage(){
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download="AHR-RemovedBG.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
  </html>
